<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Malolos City — Disaster Readiness Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f7f0e1;
    --ink: #1a1a2e;
    --red: #e0463a;
    --blue: #4a7fd6;
    --teal: #3a9b6e;
    --gold: #e0a72e;
    --hp-green: #6abe30;
    --hp-yellow: #f7d51d;
    --hp-red: #e0463a;
  }
  
  * { box-sizing: border-box; }
  
  html, body { 
    margin: 0; 
    padding: 0; 
    width: 100vw; 
    height: 100dvh; /* Uses actual dynamic viewport height on mobile */
    overflow: hidden; /* Prevents any native browser scrolling */
    background: radial-gradient(circle at 50% -10%, #38395c 0%, #14141f 65%);
    font-family: 'Press Start 2P', monospace; 
    color: var(--cream); 
    user-select: none; 
    -webkit-user-select: none;
    touch-action: none; /* Disables pull-to-refresh and pinch-zoom */
    display: flex; 
    align-items: center; 
    justify-content: center;
  }

  /* * THE MASTER WRAPPER
   * This box is rigidly set to 800x750. 
   * JS will scale this entire box up or down to fit the screen.
   */
  #game-wrapper {
    position: relative;
    width: 800px;
    height: 750px;
    transform-origin: center center;
  }

  /* Game Container (Fixed 800x600) */
  #game-container {
    position: absolute;
    top: 0;
    left: 0;
    width: 800px; 
    height: 600px; 
    box-shadow: 0 0 0 4px var(--ink), 0 0 0 8px var(--cream), 0 15px 30px rgba(0,0,0,0.5);
    background: #000; 
    border-radius: 4px; 
    overflow: hidden;
  }
  
  canvas { 
    display: block; 
    width: 100%; 
    height: 100%; 
    image-rendering: pixelated; 
  }
  
  /* UI Layer (Overlays directly on top of the 800x600 canvas) */
  #ui-layer { 
    position: absolute; 
    top: 0; 
    left: 0; 
    width: 100%; 
    height: 100%; 
    pointer-events: none; 
    display: flex; 
    flex-direction: column; 
    justify-content: space-between; 
    padding: 20px; 
    z-index: 10; 
  }
  
  /* Top Bar & Status */
  .top-bar { display: flex; justify-content: space-between; align-items: flex-start; text-shadow: 2px 2px 0 var(--ink); }
  .status-box { background: rgba(26,26,46,0.85); padding: 10px 15px; border: 2px solid var(--cream); border-radius: 4px; display: flex; flex-direction: column; gap: 8px; }
  .hp-bar-bg { width: 150px; height: 12px; background: #444; border: 2px solid var(--ink); position: relative; }
  .hp-bar-fill { height: 100%; background: var(--hp-green); transition: width 0.3s, background 0.3s; }
  
  /* Location Banner */
  #location-banner { position: absolute; top: 80px; left: 50%; transform: translateX(-50%); background: rgba(224,70,58,0.9); padding: 10px 20px; border: 2px solid var(--cream); text-align: center; opacity: 0; transition: opacity 0.5s; font-size: 14px; text-shadow: 2px 2px 0 var(--ink); box-shadow: 0 4px 0 var(--ink); }
  
  /* Objectives */
  .objectives-box { background: rgba(26,26,46,0.85); padding: 10px; border: 2px solid var(--cream); border-radius: 4px; font-size: 10px; line-height: 1.5; max-width: 250px; text-align: right; text-shadow: 1px 1px 0 var(--ink); }
  .obj-item { margin-bottom: 5px; color: #aaa; }
  .obj-item.active { color: var(--gold); }
  .obj-item.done { color: var(--teal); text-decoration: line-through; }
  
  /* Dialog Box */
  #dialog-box { background: rgba(26,26,46,0.95); border: 4px solid var(--cream); padding: 20px; border-radius: 8px; min-height: 120px; display: none; flex-direction: column; gap: 15px; box-shadow: 0 10px 0 rgba(0,0,0,0.5); position: relative; pointer-events: auto; }
  #dialog-speaker { color: var(--gold); font-size: 14px; text-transform: uppercase; text-shadow: 2px 2px 0 var(--ink); }
  #dialog-text { font-size: 12px; line-height: 1.8; color: #fff; }
  .blinking-arrow { align-self: flex-end; animation: blink 1s infinite; color: var(--gold); }
  @keyframes blink { 0%,100% {opacity:1;} 50% {opacity:0;} }
  
  /* Title Screen */
  #title-screen { position: absolute; inset: 0; background: rgba(26,26,46,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; z-index: 20; padding: 20px; }
  #title-screen h1 { color: var(--gold); font-size: 32px; text-shadow: 4px 4px 0 var(--red); margin-bottom: 20px; line-height: 1.4; }
  #title-screen p { font-size: 12px; line-height: 1.6; max-width: 600px; margin-bottom: 40px; color: #ccc; }
  .start-btn { background: var(--red); color: var(--cream); font-family: inherit; font-size: 16px; padding: 15px 30px; border: 4px solid var(--cream); cursor: pointer; box-shadow: 0 6px 0 var(--ink); transition: transform 0.1s; pointer-events: auto; }
  .start-btn:active { transform: translateY(6px); box-shadow: 0 0 0 var(--ink); }
  
  /* Game Over Screen */
  #game-over { position: absolute; inset: 0; background: rgba(224,70,58,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 20; text-align: center; }
  #game-over h1 { font-size: 40px; color: var(--ink); margin-bottom: 20px; }
  
  /* Mobile Controls (Fixed beneath the canvas) */
  .mobile-controls { 
    position: absolute;
    top: 620px; /* 600px canvas height + 20px gap */
    left: 0;
    width: 800px; 
    display: none; 
    justify-content: space-between; 
    align-items: center;
    padding: 0 20px;
  }
  
  .dpad { display: grid; grid-template-columns: 60px 60px 60px; grid-template-rows: 60px 60px 60px; gap: 5px; }
  .dpad button, .action-btns button { background: rgba(255,255,255,0.2); border: 2px solid var(--cream); color: var(--cream); font-family: inherit; border-radius: 8px; font-size: 20px; touch-action: none; user-select: none; pointer-events: auto;}
  .dpad button:active, .action-btns button:active { background: rgba(255,255,255,0.5); }
  
  .action-btns { display: flex; gap: 15px; align-items: flex-end; height: 100%; padding-bottom: 20px; }
  .action-btns button { width: 80px; height: 80px; border-radius: 50%; font-size: 24px; }
  
  /* Only show controls on smaller screens */
  @media (max-width: 850px) {
    .mobile-controls { display: flex; }
  }

  /* Sound Toggle - Absolute to screen, NOT the wrapper */
  #mute-btn { position: absolute; top: 20px; right: 20px; background: none; border: none; color: var(--cream); font-family: inherit; font-size: 10px; cursor: pointer; opacity: 0.5; z-index: 30; pointer-events: auto; }
  #mute-btn:hover { opacity: 1; }
</style>
</head>
<body>

<button id="mute-btn">♪ SOUND: ON</button>

<div id="game-wrapper">
  
  <div id="game-container">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    
    <div id="ui-layer">
      <div class="top-bar">
        <div class="status-box">
          <div>HP <span id="hp-text">100</span>/100</div>
          <div class="hp-bar-bg"><div id="hp-fill" class="hp-bar-fill"></div></div>
          <div style="font-size:10px; color:var(--gold);">DAY <span id="day-text">1</span>/3</div>
        </div>
        <div class="objectives-box" id="obj-container"></div>
      </div>
      <div id="location-banner">BARASOAIN CHURCH</div>
      <div id="dialog-box">
        <div id="dialog-speaker"></div>
        <div id="dialog-text"></div>
        <div class="blinking-arrow">▼</div>
      </div>
    </div>
    
    <div id="title-screen">
      <h1>MALOLOS CITY:<br>DISASTER READINESS</h1>
      <p>A super typhoon is approaching Bulacan in 3 days. Navigate historic Malolos, gather supplies, and secure your family before the storm hits.</p>
      <button class="start-btn" onclick="startGame()">START MISSION</button>
    </div>
    
    <div id="game-over">
      <h1 id="end-title">GAME OVER</h1>
      <p id="end-desc" style="line-height:1.8; max-width:500px; margin-bottom:30px;"></p>
      <button class="start-btn" onclick="location.reload()">TRY AGAIN</button>
    </div>
  </div>

  <div class="mobile-controls">
    <div class="dpad">
      <div></div><button data-key="ArrowUp">U</button><div></div>
      <button data-key="ArrowLeft">L</button><button data-key="ArrowDown">D</button><button data-key="ArrowRight">R</button>
    </div>
    <div class="action-btns">
      <button id="b-btn">B</button>
      <button id="a-btn">A</button>
    </div>
  </div>

</div>

<script>
/* ---------- 1. AUDIO SYSTEM ---------- */
const AudioContext = window.AudioContext || window.webkitAudioContext;
let actx;
let muted = false;

function ensureAudio() {
    if (!actx) actx = new AudioContext();
    if (actx.state === 'suspended') actx.resume();
}

function playTone(freq, type, duration, vol=0.1) {
    if(muted || !actx) return;
    const osc = actx.createOscillator();
    const gain = actx.createGain();
    osc.type = type; osc.frequency.setValueAtTime(freq, actx.currentTime);
    gain.gain.setValueAtTime(vol, actx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + duration);
    osc.connect(gain); gain.connect(actx.destination);
    osc.start(); osc.stop(actx.currentTime + duration);
}

const sfx = {
    step: () => playTone(150, 'square', 0.1, 0.05),
    pickup: () => { playTone(600, 'sine', 0.1, 0.1); setTimeout(()=>playTone(800, 'sine', 0.2, 0.1), 100); },
    talk: () => playTone(400, 'triangle', 0.05, 0.05),
    hurt: () => playTone(100, 'sawtooth', 0.3, 0.2),
    win: () => { [400,500,600,800].forEach((f,i)=>setTimeout(()=>playTone(f,'square',0.2,0.1), i*150)); }
};

/* ---------- 2. GAME STATE & CONSTANTS ---------- */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const TILE = 40;
const COLS = 20; 
const ROWS = 15;

let currentMap = 'plaza';
let day = 1;
let hp = 100;
let hasKit = false;
let hasFood = false;
let hasRadio = false;
let familySecured = false;
let currentDialog = [];
let dialogIndex = 0;

/* ---------- 4. PLAYER OBJECT ---------- */
const player = {
    c: 9, r: 10,
    color: varValue('--cream'),
    dir: 'down',
    moving: false,
    speed: 0.15,
    pixelX: 9*TILE, pixelY: 10*TILE,
    targetX: 9*TILE, targetY: 10*TILE
};

function varValue(name) {
    return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}

/* ---------- 5. OBJECTIVES ---------- */
const objectives = [
    { id:'kit', text:'Find First Aid Kit', check: ()=>hasKit },
    { id:'food', text:'Stockpile Food', check: ()=>hasFood },
    { id:'radio', text:'Find Crank Radio', check: ()=>hasRadio },
    { id:'family', text:'Secure Family (East)', check: ()=>familySecured },
    { id:'evac', text:'Evacuate to Church (North)', check: ()=>false }
];

function updateObjectives() {
    const cont = document.getElementById('obj-container');
    cont.innerHTML = '<div style="color:var(--gold); margin-bottom:10px;">MISSION:</div>';
    let allReady = true;
    
    objectives.forEach(o => {
        if(o.id === 'evac' && !allReady) return; 
        const done = o.check();
        if(!done && o.id !== 'evac') allReady = false;
        
        let cls = 'obj-item';
        if(done) cls += ' done';
        else if(o.id === 'evac') cls += ' active';
        
        cont.innerHTML += `<div class="${cls}">- ${o.text}</div>`;
    });
}

/* ---------- 6. INPUT HANDLING ---------- */
const keys = {};
window.addEventListener('keydown', (e)=>{
    if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Enter',' '].includes(e.key)) e.preventDefault();
    keys[e.key] = true;
    if(gameState==='title' && (e.key==='Enter'||e.key===' ')){ startGame(); return; }
    if(gameState==='dialog' && (e.key==='Enter'||e.key===' ')){ ensureAudio(); advanceDialog(); return; }
});
window.addEventListener('keyup', (e)=>{ keys[e.key] = false; });

/* ---------- 7. MOVEMENT LOGIC ---------- */
function attemptMove(dir) {
    if(gameState !== 'explore' || player.moving) return;
    let nc = player.c; let nr = player.r;
    if(dir==='up') nr--; if(dir==='down') nr++;
    if(dir==='left') nc--; if(dir==='right') nc++;
    
    player.dir = dir;
    
    if(nc<0 || nc>=COLS || nr<0 || nr>=ROWS) return;
    
    const map = maps[currentMap];
    const tile = map.data[nr][nc];
    if(tile === 1 || tile === 2) return; 
    
    if(map.npcs.some(n => n.c === nc && n.r === nr)) return;
    
    player.c = nc; player.r = nr;
    player.targetX = nc * TILE;
    player.targetY = nr * TILE;
    player.moving = true;
    sfx.step();
}

/* ---------- 8. INTERACTION ---------- */
function interact() {
    if(gameState !== 'explore' || player.moving) return;
    
    let tc = player.c; let tr = player.r;
    if(player.dir==='up') tr--; if(player.dir==='down') tr++;
    if(player.dir==='left') tc--; if(player.dir==='right') tc++;
    
    const map = maps[currentMap];
    
    const npc = map.npcs.find(n => n.c === tc && n.r === tr);
    if(npc) {
        if(npc.name === 'Family Member') {
            if(hasKit && hasFood && hasRadio) {
                npc.text = ["Great job! You have everything.","Let's evacuate to Barasoain Church now!"];
                familySecured = true;
                updateObjectives();
                sfx.pickup();
            } else {
                npc.text = ["We can't leave yet!","We still need the First Aid, Food, and Radio!"];
            }
        }
        startDialog(npc.name, npc.text);
        return;
    }
    
    const itemIdx = map.items.findIndex(i => i.c === tc && i.r === tr);
    if(itemIdx > -1) {
        const itm = map.items[itemIdx];
        if(itm.type === 'kit') hasKit = true;
        if(itm.type === 'food') hasFood = true;
        if(itm.type === 'radio') hasRadio = true;
        
        map.items.splice(itemIdx, 1);
        startDialog("SYSTEM", [itm.desc]);
        sfx.pickup();
        updateObjectives();
        return;
    }
}

/* ---------- 9. DIALOG SYSTEM ---------- */
function startDialog(speaker, lines) {
    gameState = 'dialog';
    currentDialog = lines;
    dialogIndex = 0;
    document.getElementById('dialog-speaker').textContent = speaker;
    document.getElementById('dialog-box').style.display = 'flex';
    sfx.talk();
    renderDialogText();
}

function renderDialogText() {
    document.getElementById('dialog-text').textContent = currentDialog[dialogIndex];
}

function advanceDialog() {
    dialogIndex++;
    if(dialogIndex >= currentDialog.length) {
        document.getElementById('dialog-box').style.display = 'none';
        gameState = 'explore';
    } else {
        sfx.talk();
        renderDialogText();
    }
}

/* ---------- 10. GAME LOOP & RENDERING ---------- */
function update() {
    if(gameState === 'explore') {
        if(keys['ArrowUp']) attemptMove('up');
        else if(keys['ArrowDown']) attemptMove('down');
        else if(keys['ArrowLeft']) attemptMove('left');
        else if(keys['ArrowRight']) attemptMove('right');
        
        if(keys[' ']) { keys[' '] = false; interact(); }
        if(keys['Enter']) { keys['Enter'] = false; interact(); }
        
        if(player.moving) {
            const dx = player.targetX - player.pixelX;
            const dy = player.targetY - player.pixelY;
            const dist = Math.sqrt(dx*dx + dy*dy);
            
            if(dist < 2) {
                player.pixelX = player.targetX;
                player.pixelY = player.targetY;
                player.moving = false;
                checkTriggers();
            } else {
                player.pixelX += dx * player.speed;
                player.pixelY += dy * player.speed;
            }
        }
    }
}

function checkTriggers() {
    const map = maps[currentMap];
    
    const door = map.doors.find(d => d.c === player.c && d.r === player.r);
    if(door) {
        currentMap = door.toMap;
        player.c = door.toC; player.r = door.toR;
        player.pixelX = player.targetX = player.c * TILE;
        player.pixelY = player.targetY = player.r * TILE;
        showLocationBanner(maps[currentMap].name);
        
        if(Math.random() > 0.5 && day < 3) {
            day++;
            document.getElementById('day-text').textContent = day;
            updateHP(-10);
            startDialog("SYSTEM", [`It is now Day ${day}. The sky grows darker...`]);
        }
        
        if(currentMap === 'church' && familySecured) {
            winGame();
        }
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    if(gameState === 'title' || gameState === 'end') return;
    
    const map = maps[currentMap];
    
    for(let r=0; r<ROWS; r++) {
        for(let c=0; c<COLS; c++) {
            const tile = map.data[r][c];
            ctx.fillStyle = map.color;
            if(tile === 1) ctx.fillStyle = "#2c3e50"; 
            if(tile === 2) ctx.fillStyle = "#2980b9"; 
            if(tile === 3) ctx.fillStyle = "#7f8c8d"; 
            
            ctx.fillRect(c*TILE, r*TILE, TILE, TILE);
            ctx.strokeStyle = "rgba(0,0,0,0.1)";
            ctx.strokeRect(c*TILE, r*TILE, TILE, TILE);
        }
    }
    
    map.items.forEach(itm => {
        ctx.fillStyle = itm.color;
        ctx.beginPath();
        ctx.arc(itm.c*TILE + TILE/2, itm.r*TILE + TILE/2, 10, 0, Math.PI*2);
        ctx.fill();
        ctx.strokeStyle = "#fff";
        ctx.stroke();
    });
    
    map.npcs.forEach(npc => {
        ctx.fillStyle = npc.color;
        ctx.fillRect(npc.c*TILE + 4, npc.r*TILE + 4, TILE-8, TILE-8);
    });
    
    ctx.fillStyle = player.color;
    ctx.fillRect(player.pixelX + 4, player.pixelY + 4, TILE-8, TILE-8);
    
    ctx.fillStyle = "#000";
    let ex = player.pixelX + TILE/2; let ey = player.pixelY + TILE/2;
    if(player.dir === 'up') { ctx.fillRect(ex-8, ey-10, 4, 4); ctx.fillRect(ex+4, ey-10, 4, 4); }
    if(player.dir === 'down') { ctx.fillRect(ex-8, ey+6, 4, 4); ctx.fillRect(ex+4, ey+6, 4, 4); }
    if(player.dir === 'left') { ctx.fillRect(ex-10, ey-4, 4, 4); }
    if(player.dir === 'right') { ctx.fillRect(ex+6, ey-4, 4, 4); }
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

/* ---------- 11. UI & HUD ---------- */
function updateHP(amt) {
    hp += amt;
    if(hp > 100) hp = 100;
    if(hp < 0) hp = 0;
    
    document.getElementById('hp-text').textContent = hp;
    const fill = document.getElementById('hp-fill');
    fill.style.width = hp + '%';
    
    if(hp > 50) fill.style.background = varValue('--hp-green');
    else if(hp > 20) fill.style.background = varValue('--hp-yellow');
    else fill.style.background = varValue('--hp-red');
    
    if(amt < 0) sfx.hurt();
    if(hp === 0) loseGame();
}

function showLocationBanner(text) {
    const banner = document.getElementById('location-banner');
    banner.textContent = text;
    banner.style.opacity = 1;
    setTimeout(() => { banner.style.opacity = 0; }, 3000);
}

/* ---------- 12. GAME FLOW ---------- */
function startGame() {
    document.getElementById('title-screen').style.display = 'none';
    gameState = 'explore';
    ensureAudio();
    updateObjectives();
    showLocationBanner(maps[currentMap].name);
}

function winGame() {
    gameState = 'end';
    sfx.win();
    document.getElementById('game-over').style.display = 'flex';
    document.getElementById('end-title').textContent = "MISSION ACCOMPLISHED";
    document.getElementById('end-title').style.color = varValue('--teal');
    document.getElementById('end-desc').textContent = "You successfully gathered all supplies and evacuated your family to Barasoain Church before the super typhoon hit. You are safe!";
}

function loseGame() {
    gameState = 'end';
    document.getElementById('game-over').style.display = 'flex';
    document.getElementById('end-title').textContent = "GAME OVER";
    document.getElementById('end-title').style.color = varValue('--ink');
    document.getElementById('end-desc').textContent = "You ran out of energy before completing your preparations. Remember: Early preparation saves lives.";
}

/* ---------- 13. SOUND TOGGLE & TOUCH CONTROLS ---------- */
const muteBtn = document.getElementById('mute-btn');
muteBtn.addEventListener('click', ()=>{
    ensureAudio();
    muted = !muted;
    muteBtn.textContent = muted ? '♪ SOUND: OFF' : '♪ SOUND: ON';
});

document.querySelectorAll('.dpad button[data-key]').forEach(btn=>{
    const k = btn.dataset.key;
    const dir = {ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right'}[k];
    
    const on = (e)=>{ e.preventDefault(); ensureAudio(); keys[k]=true; attemptMove(dir); };
    const off = (e)=>{ e.preventDefault(); keys[k]=false; };
    
    btn.addEventListener('touchstart', on, {passive: false}); 
    btn.addEventListener('touchend', off, {passive: false}); 
    btn.addEventListener('touchcancel', off, {passive: false});
    btn.addEventListener('mousedown', on); 
    btn.addEventListener('mouseup', off); 
    btn.addEventListener('mouseleave', off);
});

document.getElementById('a-btn').addEventListener('touchstart', (e)=>{ e.preventDefault(); keys['Enter']=true; if(gameState==='dialog'){ advanceDialog(); return; } interact(); }, {passive:false});
document.getElementById('a-btn').addEventListener('touchend', (e)=>{ e.preventDefault(); keys['Enter']=false; }, {passive:false});
document.getElementById('a-btn').addEventListener('mousedown', ()=>{ keys['Enter']=true; if(gameState==='dialog'){ advanceDialog(); return; } interact(); });
document.getElementById('a-btn').addEventListener('mouseup', ()=>{ keys['Enter']=false; });

/* ---------- 14. PERFECT VIEWPORT SCALING ---------- */
function scaleGame() {
    const wrapper = document.getElementById('game-wrapper');
    const padding = 20; 
    
    // The fixed dimensions of the wrapper
    const targetWidth = 800;
    const targetHeight = 750; // 600 for canvas + 150 for controls
    
    // Calculate how much we need to scale down to fit the current screen
    const scaleX = (window.innerWidth - padding) / targetWidth;
    const scaleY = (window.innerHeight - padding) / targetHeight;
    
    // Use whichever scale is smaller to ensure neither width nor height is cropped
    let scale = Math.min(scaleX, scaleY);
    
    // Optional: Don't let it scale up beyond 1.2x on very large desktop screens
    if (scale > 1.2) scale = 1.2;
    
    // Apply the mathematical scale directly to the rigid container
    wrapper.style.transform = `scale(${scale})`;
}

// Ensure the game resizes correctly on window load, resize, or device rotation
window.addEventListener('resize', scaleGame);
window.addEventListener('orientationchange', () => setTimeout(scaleGame, 100));

// Kick off the scaling and the game loop
scaleGame();
requestAnimationFrame(loop);

</script>
