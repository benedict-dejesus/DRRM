<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Malolos City — Disaster Readiness Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#f7f0e1;
    --ink:#1a1a2e;
    --red:#e0463a;
    --blue:#4a7fd6;
    --teal:#3a9b6e;
    --gold:#e0a72e;
    --hp-green:#6abe30;
    --hp-yellow:#f7d51d;
    --hp-red:#e0463a;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; }
  body{
    min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
    background: radial-gradient(circle at 50% -10%, #38395c 0%, #14141f 65%);
    font-family:'Press Start 2P', monospace; color:var(--cream); user-select:none;
    padding:20px; gap:10px;
  }
  /* ===== Console shell ===== */
  .console{
    position:relative;
    background:linear-gradient(160deg,#4c4c6e,#26263a);
    border-radius:18px 18px 46px 18px;
    padding:24px 24px 16px;
    box-shadow:0 24px 60px rgba(0,0,0,0.55), inset 0 2px 0 rgba(255,255,255,0.08);
  }
  .console-led{
    position:absolute; top:13px; right:26px; width:9px; height:9px; border-radius:50%;
    background:var(--hp-green); box-shadow:0 0 8px var(--hp-green);
  }
  .console-label{
    position:absolute; top:13px; left:26px; font-size:8px; letter-spacing:2px; color:#9a9ac4;
  }
  #game-container{
    position:relative; width:480px; height:480px; background:#000; overflow:hidden;
    border-radius:6px;
    box-shadow: inset 0 0 0 4px #0d0d1a, inset 0 0 0 8px #1a1a2e, inset 0 0 22px rgba(0,0,0,0.6);
  }
  canvas{ display:block; image-rendering:pixelated; image-rendering:crisp-edges; }

  /* ===== HUD ===== */
  #hud{
    position:absolute; top:8px; left:8px; z-index:40;
    background:rgba(20,20,36,0.82); border:2px solid var(--cream); border-radius:4px;
    padding:5px 8px; font-size:8px; display:flex; align-items:center; gap:8px; line-height:1.6;
  }
  #hud .badges{ display:flex; gap:3px; }
  #hud .badge-slot{
    width:16px; height:16px; border:1px solid var(--cream); border-radius:50%;
    display:flex; align-items:center; justify-content:center; background:#000; opacity:.35;
  }
  #hud .badge-slot.earned{ opacity:1; box-shadow:0 0 6px var(--gold); border-color:var(--gold); }
  #hud .badge-slot canvas{ width:12px; height:12px; }
  #dex{
    position:absolute; top:8px; right:8px; z-index:40;
    background:rgba(20,20,36,0.82); border:2px solid var(--cream); border-radius:4px;
    padding:5px 8px; font-size:8px; color:var(--hp-yellow);
  }

  /* ===== Overlays ===== */
  .overlay{
    position:absolute; inset:0; display:none; flex-direction:column;
    align-items:center; justify-content:center; z-index:100; padding:22px; box-sizing:border-box;
  }
  .overlay.active{ display:flex; }

  /* ===== Title screen ===== */
  #startup{
    background:linear-gradient(180deg,#4a7fd6 0%, #74b04a 54%, #6abe30 100%);
    text-align:center;
  }
  .logo{
    font-size:30px; line-height:1.35; color:#fff;
    text-shadow:4px 4px 0 var(--red), 8px 8px 0 var(--ink);
    letter-spacing:2px; margin-top:6px;
  }
  .subtitle{
    margin-top:14px; font-size:9px; background:var(--ink); color:var(--hp-yellow);
    padding:6px 12px; border-radius:3px; letter-spacing:2px;
  }
  .role-tag{
    margin-top:26px; font-size:9px; color:var(--ink); background:rgba(255,255,255,0.88);
    padding:8px 14px; border:2px solid var(--ink); line-height:1.8; border-radius:2px;
  }
  #title-sprite{ margin-top:16px; width:48px; height:48px; image-rendering:pixelated; }
  .blink{
    margin-top:18px; font-size:10px; color:var(--ink); cursor:pointer;
    animation:blinker 1s step-start infinite; background:rgba(255,255,255,0.6); padding:6px 10px; border-radius:2px;
  }
  @keyframes blinker{ 50%{ opacity:0; } }

  /* ===== Dialog box ===== */
  #dialog{
    position:absolute; left:10px; bottom:10px; width:460px; min-height:104px;
    background:var(--cream); border:4px solid var(--ink); border-radius:6px;
    padding:14px 18px; font-size:11px; line-height:1.8; color:var(--ink);
    display:none; z-index:150; cursor:pointer; box-shadow:0 0 0 2px var(--ink) inset;
  }
  #dialog-text{ white-space:pre-line; }
  #dialog .arrow{ position:absolute; right:14px; bottom:10px; display:none; animation:blinker .6s step-start infinite; }
  #dialog.show-arrow .arrow{ display:block; }

  /* ===== Generic menu box (Directories) ===== */
  .menu-box{
    background:var(--cream); border:4px solid var(--ink); border-radius:8px;
    padding:18px 22px; width:92%; max-width:410px; color:var(--ink); box-shadow:0 0 0 2px var(--ink) inset;
  }
  .menu-box h3{ font-size:13px; margin:0 0 6px; letter-spacing:1px; line-height:1.4; }
  .menu-box p{ font-size:9px; line-height:1.6; margin:0 0 14px; color:var(--red); }
  .menu-box ul{ font-size:9px; line-height:1.9; padding-left:16px; margin:0 0 14px; }
  .menu-btn{
    display:block; width:100%; padding:10px; margin:8px 0; font-family:'Press Start 2P';
    font-size:9px; background:#fff; border:2px solid var(--ink); cursor:pointer; text-align:center; color:var(--ink);
  }
  .menu-btn:hover{ background:#eee; }

  /* ===== Battle screen ===== */
  #battle-screen{
    background:linear-gradient(180deg,#bfe6c1 0%, #bfe6c1 58%, #8a5a2c 58%, #8a5a2c 100%);
    padding:0; justify-content:flex-end;
  }
  .battle-field{ position:absolute; top:0; left:0; right:0; bottom:118px; }
  .platform{ position:absolute; width:120px; height:30px; background:rgba(0,0,0,0.18); border-radius:50%; }
  .opp-platform{ top:78px; right:46px; }
  .ply-platform{ bottom:46px; left:34px; }
  .sprite-box{ position:absolute; image-rendering:pixelated; }
  #opp-sprite{ top:18px; right:60px; width:64px; height:64px; }
  #ply-sprite{ bottom:58px; left:48px; width:96px; height:96px; }
  .info-box{
    position:absolute; background:var(--cream); border:3px solid var(--ink); border-radius:6px;
    padding:8px 10px; font-size:9px; min-width:158px; color:var(--ink); line-height:1.5;
  }
  .opp-info{ top:14px; left:14px; }
  .ply-info{ bottom:14px; right:14px; }
  .hp-row{ display:flex; align-items:center; gap:6px; margin-top:4px; }
  .hp-label{ font-size:8px; color:var(--blue); }
  .hp-bar-bg{ flex:1; height:6px; background:#999; border:1px solid var(--ink); }
  .hp-bar{ height:100%; background:var(--hp-green); width:100%; transition:width .5s ease; }
  #battle-msgbox{
    position:absolute; left:0; right:0; bottom:0; height:118px;
    background:var(--cream); border-top:4px solid var(--ink); padding:12px 16px; box-sizing:border-box; color:var(--ink);
  }
  #battle-text{ font-size:9px; line-height:1.6; min-height:40px; white-space:pre-line; }
  .battle-actions{ display:flex; flex-direction:column; gap:6px; margin-top:8px; }
  .battle-btn{
    font-family:'Press Start 2P'; font-size:8px; background:#fff; border:2px solid var(--ink);
    padding:8px; cursor:pointer; color:var(--ink); text-align:left;
  }
  .battle-btn:hover{ background:#eee; }
  .battle-btn:disabled{ opacity:.4; cursor:default; }

  /* ===== Fade transition ===== */
  #fade{
    position:absolute; inset:0; background:#000; opacity:0; pointer-events:none;
    transition:opacity .25s; z-index:200;
  }
  #fade.show{ opacity:1; }

  /* ===== Sound toggle ===== */
  #mute-btn{
    position:absolute; bottom:8px; right:8px; z-index:45;
    background:rgba(20,20,36,0.82); color:var(--cream); border:2px solid var(--cream);
    border-radius:4px; font-family:'Press Start 2P'; font-size:8px; padding:5px 7px; cursor:pointer;
  }

  /* ===== Controls / mobile dpad ===== */
  .controls-hint{
    margin-top:6px; font-size:8px; color:#c9c9e6; text-align:center; line-height:1.7;
  }
  .controls-hint b{ color:var(--hp-yellow); }
  .touch-controls{
    display:none; justify-content:space-between; align-items:center; margin-top:10px; padding:0 6px;
  }
  .dpad{ display:grid; grid-template-columns:34px 34px 34px; grid-template-rows:34px 34px 34px; gap:3px; }
  .dpad button{
    background:#3d3d58; border:2px solid var(--ink); color:#fff; font-family:'Press Start 2P';
    border-radius:4px; font-size:12px; touch-action:none;
  }
  .dpad button:active{ background:#5a5a80; }
  .dpad .d-up{ grid-area:1/2; } .dpad .d-left{ grid-area:2/1; } .dpad .d-mid{ grid-area:2/2; visibility:hidden; }
  .dpad .d-right{ grid-area:2/3; } .dpad .d-down{ grid-area:3/2; }
  .a-btn{
    width:54px; height:54px; border-radius:50%; background:var(--red); border:2px solid var(--ink);
    color:#fff; font-family:'Press Start 2P'; font-size:11px; touch-action:none;
  }
  .a-btn:active{ background:#ff6a5c; }
  @media (max-width:560px){
    .console{ padding:14px 14px 10px; }
    #game-container{ width:340px; height:340px; }
    .touch-controls{ display:flex; }
    .controls-hint{ display:none; }
  }
</style>
</head>

        <div class="role-tag">CDRRMO DIRECTORY<br>&amp; Survival Guide Simulation</div>
        <canvas id="title-sprite" width="48" height="48"></canvas>
        <div class="blink" id="start-btn">▶ PRESS ENTER TO START</div>
      </div>

      <div id="dialog"><span id="dialog-text"></span><span class="arrow">▼</span></div>

      <div id="directory-screen" class="overlay">
        <div class="menu-box">
          <h3 id="dir-title">BUILDING TITLE</h3>
          <p id="dir-hotline">HOTLINE: 000-0000</p>
          <ul id="dir-list">
            <li>Scenario 1</li>
          </ul>
          <button class="menu-btn" onclick="closeDirectory()">EXIT BUILDING</button>
        </div>
      </div>

      <div id="battle-screen" class="overlay">
        <div class="battle-field">
          <div class="info-box opp-info">
            <div id="opp-name">EMERGENCY</div>
            <div class="hp-row"><span class="hp-label">HP</span><div class="hp-bar-bg"><div class="hp-bar" id="opp-hp"></div></div></div>
          </div>
          <div class="platform opp-platform"></div>
          <canvas class="sprite-box" id="opp-sprite" width="64" height="64"></canvas>

          <div class="platform ply-platform"></div>
          <canvas class="sprite-box" id="ply-sprite" width="96" height="96"></canvas>
          <div class="info-box ply-info">
            <div>CITIZEN &nbsp;Lv.10</div>
            <div class="hp-row"><span class="hp-label">HP</span><div class="hp-bar-bg"><div class="hp-bar" id="ply-hp"></div></div></div>
          </div>
        </div>
        <div id="battle-msgbox">
          <div id="battle-text"></div>
          <div class="battle-actions" id="battle-actions">
            <button class="battle-btn" id="btn-action1">► ACTION 1</button>
            <button class="battle-btn" id="btn-action2">► ACTION 2</button>
          </div>
        </div>
      </div>

      <div id="fade"></div>
      <button id="mute-btn">♪ SOUND: ON</button>
    </div>

    <div class="controls-hint">
      <b>Arrow Keys / WASD</b> move &nbsp;•&nbsp; <b>Enter / Space</b> interact &amp; advance text
    </div>
    <div class="touch-controls">
      <div class="dpad">
        <button class="d-up" data-key="ArrowUp">▲</button>
        <button class="d-left" data-key="ArrowLeft">◀</button>
        <div class="d-mid"></div>
        <button class="d-right" data-key="ArrowRight">▶</button>
        <button class="d-down" data-key="ArrowDown">▼</button>
      </div>
      <button class="a-btn" id="a-btn">A</button>
    </div>
  </div>

function spr(rows){
    const arr = [];
    for(const row of rows){ for(const ch of row) arr.push(CMAP[ch]); }
    return arr;
}
function renderSprite(pixelArray, overrides){
    const c = document.createElement('canvas');
    c.width = 16; c.height = 16;
    const cx = c.getContext('2d');
    for(let y=0;y<16;y++){
        for(let x=0;x<16;x++){
            const idx = pixelArray[y*16+x];
            if(idx===0) continue;
            cx.fillStyle = (overrides && overrides[idx]) ? overrides[idx] : PALETTE[idx];
            cx.fillRect(x,y,1,1);
        }
    }
    return c;
}

/* ---------- 5. SOUND (Web Audio) ---------- */
let audioCtx = null;
function ensureAudio(){
    if(!audioCtx){
        try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){}
    }
    if(audioCtx && audioCtx.state==='suspended') audioCtx.resume();
}
function beep(freq,dur,type,vol,delay){
    if(muted || !audioCtx) return;
    type=type||'square'; vol=vol||0.045; delay=delay||0;
    const t0=audioCtx.currentTime+delay;
    const osc=audioCtx.createOscillator();
    const gain=audioCtx.createGain();
    osc.type=type; osc.frequency.value=freq;
    gain.gain.setValueAtTime(vol,t0);
    gain.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(t0); osc.stop(t0+dur+0.02);
}
function sfxStep(){ beep(180,0.03,'square',0.018); }
function sfxBump(){ beep(110,0.05,'square',0.03); }
function sfxSelect(){ beep(880,0.045,'square',0.035); }

/* ---------- 6. SPRITE / DRAW HELPERS ---------- */
function frameImg(prefix, dir, frame){
    let d = dir==='right' ? 'left' : dir;
    let key = prefix+'_'+d+'_'+frame;
    if(IMG[key]) return IMG[key];
    key = prefix+'_'+d+'_0';
    if(IMG[key]) return IMG[key];
    return IMG[prefix+'_down_0'];
}
function drawChar(img, dx, dy, flip){
    if(flip){
        ctx.save();
        ctx.translate(dx+TILE, dy);
        ctx.scale(-1,1);
        ctx.drawImage(img,0,0,16,16,0,0,TILE,TILE);
        ctx.restore();
    } else {
        ctx.drawImage(img,0,0,16,16,dx,dy,TILE,TILE);
    }
}
function tileImage(val, waterFrame){
    if(val===0) return IMG.path;
    if(val===1) return IMG.lawn;
    if(val===2) return IMG.tallgrass;
    if(val===3) return IMG.tree;
    if(val===4) return waterFrame ? IMG.water2 : IMG.water1;
    if(val===5) return IMG.flower;
    if(val===6) return IMG.sign;
    if(val>=110){
        const shape=val%10, bld=Math.floor(val/10);
        if(shape===0) return ROOF_IMG[bld];
        if(shape===1) return IMG.wallwindow;
        if(shape===2) return IMG.wallplain;
        if(shape===3) return IMG.door;
    }
    return IMG.lawn;
}

/* ---------- 7. CAMERA / RENDER ---------- */
function clamp(v,lo,hi){ return Math.max(lo, Math.min(hi, v)); }
function updateCamera(){
    const vw=VIEW_W*TILE, vh=VIEW_H*TILE;
    camera.x = clamp(player.px + TILE/2 - vw/2, 0, MAP_W*TILE - vw);
    camera.y = clamp(player.py + TILE/2 - vh/2, 0, MAP_H*TILE - vh);
}
let waterFrame = 0, waterTimer = 0, npcTimer = 0;

function render(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    const startCol = Math.floor(camera.x/TILE), startRow = Math.floor(camera.y/TILE);
    const endCol = Math.ceil((camera.x+VIEW_W*TILE)/TILE), endRow = Math.ceil((camera.y+VIEW_H*TILE)/TILE);
    for(let ty=startRow; ty<endRow; ty++){
        for(let tx=startCol; tx<endCol; tx++){
            if(tx<0||ty<0||tx>=MAP_W||ty>=MAP_H) continue;
            const img = tileImage(mapData[ty][tx], waterFrame);
            ctx.drawImage(img,0,0,16,16, tx*TILE-camera.x, ty*TILE-camera.y, TILE, TILE);
        }
    }
    for(const npc of npcs){
        const img = frameImg(npc.key, npc.dir, npc.frame);
        drawChar(img, npc.tx*TILE-camera.x, npc.ty*TILE-camera.y, npc.dir==='right');
    }
    const pimg = frameImg('player', player.dir, player.frame);
    drawChar(pimg, player.px-camera.x, player.py-camera.y, player.dir==='right');
}

function walkableTile(tx,ty){
    if(tx<0||ty<0||tx>=MAP_W||ty>=MAP_H) return false;
    const v = mapData[ty][tx];
    return v===0||v===1||v===2||v===5;
}
function npcAt(tx,ty){ return npcs.find(n=>n.tx===tx && n.ty===ty); }

function onArrive(){
    const v = mapData[player.ty][player.tx];
    if(v===2 && Math.random()<0.15) triggerBattle();
}
function handleBlocked(nx,ny,npc){
    if(npc){
        const opp = {up:'down',down:'up',left:'right',right:'left'};
        npc.dir = opp[player.dir];
        sfxSelect();
        showDialogPages(npc.lines.slice());
        return;
    }
    if(nx<0||ny<0||nx>=MAP_W||ny>=MAP_H){ sfxBump(); return; }
    const v = mapData[ny][nx];
    if(v===6){
        sfxSelect();
        showDialogPages((SIGN_TEXT[ny+'_'+nx] || ["A sign."]).slice());
        return;
    }
    if(v>=110){
        const shape=v%10, bld=Math.floor(v/10);
        if(shape===3){ handleDoor(bld); return; }
    }
    sfxBump();
}
function handleDoor(bld){
    sfxDoor();
    openDirectory(bld);
}
function attemptMove(dir){
    if(gameState!=='overworld' || player.moving) return;
    player.dir = dir;
    const [dx,dy] = DIRS[dir];
    const nx = player.tx+dx, ny = player.ty+dy;
    const blockingNpc = npcAt(nx,ny);
    if(!blockingNpc && walkableTile(nx,ny)){
        player.fromX=player.px; player.fromY=player.py;
        player.toX=nx*TILE; player.toY=ny*TILE;
        player.tx=nx; player.ty=ny;
        player.moving=true; player.moveStart=performance.now();
        sfxStep();
    } else {
        handleBlocked(nx,ny,blockingNpc);
    }
}
function openDirectory(bldId){
    sfxSelect();
    const data = DIRECTORIES[bldId];
    if(!data) return;
    document.getElementById('dir-title').textContent = data.title;
    document.getElementById('dir-hotline').textContent = data.hotline;

/* ---------- 9. DIALOG SYSTEM (typewriter) ---------- */
const dialogEl = document.getElementById('dialog');
const dialogTextEl = document.getElementById('dialog-text');
const dlg = { pages:[], index:0, typing:false, timer:null, returnState:'overworld' };

function showDialogPages(pages){
    dlg.pages = pages;
    dlg.index = 0;
    dlg.returnState = (gameState==='overworld') ? 'overworld' : gameState;
    gameState = 'dialog';
    dialogEl.style.display = 'block';
    startPage();
}
function startPage(){
    dlg.typing = true;
    dialogEl.classList.remove('show-arrow');
    dialogTextEl.textContent = '';
    clearInterval(dlg.timer);
    let i = 0;
    const text = dlg.pages[dlg.index];
    dlg.timer = setInterval(()=>{
        i++;
        dialogTextEl.textContent = text.slice(0,i);
        if(i % 4 === 0) sfxBlip();
        if(i >= text.length){
            clearInterval(dlg.timer);
            dlg.typing = false;
            dialogEl.classList.add('show-arrow');
        }
    },28);
}
function advanceDialog(){
    if(dlg.typing){
        clearInterval(dlg.timer);
        dialogTextEl.textContent = dlg.pages[dlg.index];
        dlg.typing = false;
        dialogEl.classList.add('show-arrow');
        return;
    }
    dlg.index++;
    if(dlg.index >= dlg.pages.length){
        dialogEl.style.display = 'none';
        dialogEl.classList.remove('show-arrow');
        gameState = dlg.returnState;
    } else {
        startPage();
    }
}
dialogEl.addEventListener('click', ()=>{ if(gameState==='dialog'){ ensureAudio(); advanceDialog(); } });

/* ---------- 10. UPDATE LOOP ---------- */
let lastTime = 0;
function update(ts){
    const dt = ts - lastTime; lastTime = ts;

    waterTimer += dt;
    if(waterTimer > 600){ waterTimer = 0; waterFrame = waterFrame ? 0 : 1; }

    npcTimer += dt;
    if(npcTimer > 700){ npcTimer = 0; npcs.forEach(n=>{ n.frame = n.frame ? 0 : 1; }); }

    if(gameState === 'overworld'){
        if(player.moving){
            let t = (ts - player.moveStart) / MOVE_DUR;
            if(t >= 1){
                t = 1; player.moving = false;
                player.px = player.toX; player.py = player.toY;
                onArrive();
            } else {
                player.px = player.fromX + (player.toX-player.fromX)*t;
                player.py = player.fromY + (player.toY-player.fromY)*t;
            }
            player.frame = Math.floor(ts/110)%2;
        } else {
            player.frame = 0;
            let dir = null;
            if(keys['ArrowUp']||keys['w']||keys['W']) dir='up';
            else if(keys['ArrowDown']||keys['s']||keys['S']) dir='down';
            else if(keys['ArrowLeft']||keys['a']||keys['A']) dir='left';
            else if(keys['ArrowRight']||keys['d']||keys['D']) dir='right';
            if(dir) attemptMove(dir);
        }
        updateCamera();
    }
}
function gameLoop(ts){
    update(ts);
    render();
    requestAnimationFrame(gameLoop);
}

/* ---------- 11. TITLE SCREEN ---------- */
function startGame(){
    ensureAudio();
    sfxConfirm();
    document.getElementById('startup').classList.remove('active');
    gameState = 'overworld';
    updateCamera();
    showDialogPages([
        "Disaster Readiness Guide Active.",
        "Explore Malolos City and visit the local directories for essential hotlines.",
        "Walking in tall grass will simulate emergency scenarios to test your response!",
    ]);
}
document.getElementById('start-btn').addEventListener('click', startGame);

const titleSpriteCanvas = document.getElementById('title-sprite');
const titleCtx = titleSpriteCanvas.getContext('2d');
titleCtx.imageSmoothingEnabled = false;
let titleFrame = 0;
setInterval(()=>{
    titleFrame = titleFrame ? 0 : 1;
    titleCtx.clearRect(0,0,48,48);
    titleCtx.drawImage(IMG['player_down_'+titleFrame],0,0,16,16,0,0,48,48);
},420);

/* ---------- 12. FADE TRANSITION ---------- */
const fadeEl = document.getElementById('fade');
function fadeTransition(cb){
    fadeEl.classList.add('show');
    setTimeout(()=>{
        cb();
        setTimeout(()=>fadeEl.classList.remove('show'), 80);
    }, 240);
}

/* ---------- 13. BATTLE SYSTEM (Emergency Simulations) ---------- */
let curBattle = null;
const battleTextEl = document.getElementById('battle-text');
const oppNameEl = document.getElementById('opp-name');
const oppHpEl = document.getElementById('opp-hp');
const plyHpEl = document.getElementById('ply-hp');
const btnAction1 = document.getElementById('btn-action1');
const btnAction2 = document.getElementById('btn-action2');

function typeText(el, text, onDone){
    let i = 0;
    el.textContent = '';
    clearInterval(el._timer);
    el._timer = setInterval(()=>{
        i++;
        el.textContent = text.slice(0,i);
        if(i % 4 === 0) sfxBlip();
        if(i >= text.length){
            clearInterval(el._timer);
            if(onDone) onDone();
        }
    }, 24);
}
function drawBattleSprite(canvasId, img, scale){
    const c = document.getElementById(canvasId);
    c.width = 16*scale; c.height = 16*scale;
    const cx = c.getContext('2d');
    cx.imageSmoothingEnabled = false;
    cx.clearRect(0,0,c.width,c.height);
    cx.drawImage(img,0,0,16,16,0,0,c.width,c.height);
}
function setHpUI(el, pct){
    el.style.width = pct+'%';
    el.style.background = pct>50 ? 'var(--hp-green)' : pct>20 ? 'var(--hp-yellow)' : 'var(--hp-red)';
}
function showBattleActions(show){
    document.getElementById('battle-actions').style.visibility = show ? 'visible' : 'hidden';
}

function triggerBattle(){
    sfxEncounter();
    const scIdx = Math.floor(Math.random() * EMERGENCIES.length);
    curBattle = { data: EMERGENCIES[scIdx], phase: 'intro', id: EMERGENCIES[scIdx].id };
    
    fadeTransition(()=>{
        gameState = 'battle';
        document.getElementById('battle-screen').classList.add('active');
        setHpUI(plyHpEl, 100);
        setHpUI(oppHpEl, 100);
        
        oppNameEl.textContent = curBattle.data.name;
        drawBattleSprite('opp-sprite', IMG[curBattle.data.icon], 4);
        drawBattleSprite('ply-sprite', IMG.player_up_0, 6);
        
        // Randomize button order
        if(Math.random()>0.5){
            btnAction1.textContent = '► '+curBattle.data.opt1.text; btnAction1._opt = curBattle.data.opt1;
            btnAction2.textContent = '► '+curBattle.data.opt2.text; btnAction2._opt = curBattle.data.opt2;
        } else {
            btnAction1.textContent = '► '+curBattle.data.opt2.text; btnAction1._opt = curBattle.data.opt2;
            btnAction2.textContent = '► '+curBattle.data.opt1.text; btnAction2._opt = curBattle.data.opt1;
        }
        
        showBattleActions(false);
        typeText(battleTextEl, curBattle.data.intro, ()=>{ curBattle.phase='choice'; showBattleActions(true); });
    });
}

function awardReadinessBadge(){
    let count = dexFound.size;
    let earnedIdx = -1;
    if(count >= 1 && !badges[0]) earnedIdx = 0;
    if(count >= 3 && !badges[1]) earnedIdx = 1;
    if(count >= 5 && !badges[2]) earnedIdx = 2;
    
    if(earnedIdx >= 0){
        badges[earnedIdx] = true;
        const slot = document.getElementById('badge-'+earnedIdx);
        slot.classList.add('earned');
        const c = document.createElement('canvas');
        c.width=12; c.height=12;
        const cx = c.getContext('2d'); cx.imageSmoothingEnabled=false;
        cx.fillStyle = '#f7d51d';
        cx.fillRect(2,2,8,8); // Generic simple badge icon block
        slot.innerHTML=''; slot.appendChild(c);
        sfxBadge();
    }
}

function handleActionClick(btn){
    ensureAudio();
    if(curBattle.phase==='cleared'){
        sfxSelect();
        endBattle();
        return;
    }
    if(curBattle.phase!=='choice') return;
    sfxSelect();
    showBattleActions(false);
    curBattle.phase='typing';
    
    const opt = btn._opt;
    
    typeText(battleTextEl, "You used: " + opt.text.toUpperCase() + "...\n" + opt.msg, ()=>{
        if(opt.correct){
            setHpUI(oppHpEl, 0);
            dexFound.add(curBattle.id);
            document.getElementById('dex').textContent = 'SURVIVOR '+dexFound.size+'/'+EMERGENCIES.length;
            setTimeout(()=>{
                awardReadinessBadge();
                curBattle.phase = 'cleared';
                btnAction1.textContent = '► RETURN TO TOWN';
                btnAction2.style.display = 'none';
                showBattleActions(true);
            }, 600);
        } else {
            setHpUI(plyHpEl, 0);
            sfxBump();
            setTimeout(()=>{
                curBattle.phase = 'cleared';
                btnAction1.textContent = '► FLEE TO MEDICAL CENTER';
                btnAction2.style.display = 'none';
                showBattleActions(true);
            }, 600);
        }
    });
}

function endBattle(){
    btnAction2.style.display = 'block'; // reset
    document.getElementById('battle-screen').classList.remove('active');
    fadeTransition(()=>{ gameState='overworld'; });
}
btnAction1.addEventListener('click', ()=>handleActionClick(btnAction1));
btnAction2.addEventListener('click', ()=>handleActionClick(btnAction2));

/* ---------- 14. INPUT ---------- */
window.addEventListener('keydown', (e)=>{
    if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
    keys[e.key] = true;
    if(gameState==='title' && (e.key==='Enter'||e.key===' ')){ startGame(); return; }
    if(gameState==='dialog' && (e.key==='Enter'||e.key===' ')){ ensureAudio(); advanceDialog(); return; }
});
window.addEventListener('keyup', (e)=>{ keys[e.key] = false; });

/* ---------- 15. SOUND TOGGLE & TOUCH CONTROLS ---------- */
const muteBtn = document.getElementById('mute-btn');
muteBtn.addEventListener('click', ()=>{
    ensureAudio();
    muted = !muted;
    muteBtn.textContent = muted ? '♪ SOUND: OFF' : '♪ SOUND: ON';
});
document.querySelectorAll('.dpad button[data-key]').forEach(btn=>{
    const k = btn.dataset.key;
    const dir = {ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right'}[k];
    const on = (e)=>{ e.preventDefault(); ensureAudio(); keys[k]=true; attemptMove(dir); };
    const off = (e)=>{ e.preventDefault(); keys[k]=false; };
    btn.addEventListener('touchstart', on); btn.addEventListener('touchend', off); btn.addEventListener('touchcancel', off);
    btn.addEventListener('mousedown', on); btn.addEventListener('mouseup', off); btn.addEventListener('mouseleave', off);
});
document.getElementById('a-btn').addEventListener('click', ()=>{
    ensureAudio();
    if(gameState==='title') startGame();
    else if(gameState==='dialog') advanceDialog();
});

/* ---------- 16. INIT ---------- */
updateCamera();
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
